name: Update zones & deploy

on:
  schedule:
    - cron: '17 4 * * *'          # daily, 04:17 UTC
  workflow_dispatch:               # manual "Run workflow" button
  push:
    branches: [ main ]
    paths-ignore: [ 'data/**' ]    # don't loop when this job commits data

permissions:
  contents: write                  # commit refreshed data
  pages: write                     # deploy Pages
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true   # a new run supersedes a stuck/queued one instead of waiting behind it

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch + convert UAS zones (ED-269 → GeoJSON)
        run: node scripts/build-zones.mjs

      - name: Commit refreshed data (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/zones.geojson data/meta.json
          if git diff --cached --quiet; then
            echo "No change in zone data."
          else
            git commit -m "data: refresh UAS zones ($(date -u +%Y-%m-%d))"
            git push
          fi

      - uses: actions/configure-pages@v5
        with:
          enablement: true   # auto-enable Pages (GitHub Actions source) if not set yet
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
